<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wireframe — NBA Stats Trivia (primary screen)</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        background: #e2e8f0;
        padding: 2rem;
      }
      .frame {
        max-width: 420px;
        margin: 0 auto;
        background: #fff;
        border: 2px dashed #64748b;
        border-radius: 12px;
        padding: 1.25rem;
      }
      .box {
        background: #f1f5f9;
        border: 1px solid #94a3b8;
        border-radius: 8px;
        padding: 0.75rem;
        margin-bottom: 0.6rem;
        color: #334155;
        font-size: 0.85rem;
      }
      h1 {
        font-size: 1rem;
        text-align: center;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <h1>Primary quiz screen (low-fi wireframe)</h1>
    <div class="frame">
      <div class="box" style="text-align: center">Header + stub badge</div>
      <div class="box">Score | Progress (e.g. 3 / 20)</div>
      <div class="box">Category tag | Season tag</div>
      <div class="box" style="min-height: 48px">Question prompt</div>
      <div class="box">Choice A</div>
      <div class="box">Choice B</div>
      <div class="box">Choice C</div>
      <div class="box">Choice D</div>
      <div class="box">Feedback + explanation</div>
      <div class="box">[ Next question ]</div>
    </div>
  </body>
</html>
